        body {
            background-color: black;
            margin: auto;
            width: 100%;
            height: 100%;
        }

        img {
            width: 100%;
        }

        #worm {
            position: fixed;
            top: 10px;
            left: 10px;

        }

        span {
            font-size: 12px;
            font-family: 'inconsolata', monospace;
            color: white;
            background-color: black;
        }
    </style>
</head>

<body>
    <img src="ethos collage.jpg">
    <div id="worm"><img style="width:15px"
            src="https://web.archive.org/web/20091027035712im_/http://uk.geocities.com/tangent_tgt/Images_JPW/BlueWormSmallSlow.gif">
        <span> [...click the subsoil to start/stop burrowing...]</span>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const speed = 0.015; // pixels per millisecond, very slow
            let direction = 1;
            let paused = false;
            let lastTime = performance.now();

            function step(now) {
                const delta = now - lastTime;
                lastTime = now;

                if (!paused) {
                    const amount = speed * delta * direction;
                    window.scrollBy(0, amount);

                    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                    if (window.scrollY >= maxScroll && direction > 0) {
                        direction = -1;
                    } else if (window.scrollY <= 0 && direction < 0) {
                        direction = 1;
                    }
                }

                requestAnimationFrame(step);
            }

            document.body.addEventListener('click', () => {
                paused = !paused;
                if (!paused) {
                    lastTime = performance.now();
                }
            });

            requestAnimationFrame(step);
        });
    </script>
</body>

</html>
