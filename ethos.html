<!doctype html>
<html lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="favicon" rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <style>
        body,
        html {
            cursor: url(earthworm.png), pointer;

        }

        body {
            background-color: black;
            margin: auto;
            width: 100%;
            height: 100%;
        }

        img {
            width: 100%;
        }

        #worm {
            position: fixed;
            top: 10px;
            left: 10px;

        }

        span {
            font-size: 12px;
            font-family: 'inconsolata', monospace;
            color: white;
            background-color: black;
        }
    </style>
</head>

<body>
    <img src="ethos collage.jpg">
    <div id="worm">
        <span> [...click the subsoil to start/stop burrowing...]</span>
    </div>
    <script>
        const speed = 0.015; // pixels per millisecond, very slow
        let direction = 1;
        let paused = true;
        let lastTime = performance.now();

        function step(now) {
            const delta = now - lastTime;
            lastTime = now;

            if (!paused) {
                const amount = speed * delta * direction;
                window.scrollBy(0, amount);

                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                if (window.scrollY >= maxScroll && direction > 0) {
                    direction = -1;
                } else if (window.scrollY <= 0 && direction < 0) {
                    direction = 1;
                }
            }

            requestAnimationFrame(step);
        }

        document.body.addEventListener('click', () => {
            paused = !paused;
            if (!paused) {
                lastTime = performance.now();
            }
        });

        requestAnimationFrame(step);
    </script>
</body>

</html>
